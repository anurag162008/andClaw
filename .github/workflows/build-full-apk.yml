name: Build full Android APK

on:
  workflow_dispatch:
    inputs:
      force_asset_rebuild:
        description: 'Delete cached prepared assets before build'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
      - master
    paths:
      - 'app/**'
      - 'install_time_assets/**'
      - 'scripts/setup-assets.sh'
      - 'scripts/build-proot-loader32-16kb.sh'
      - 'terminal/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - 'README.md'
      - '.github/workflows/build-full-apk.yml'

concurrency:
  group: build-full-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      DOCKER_BASE_IMAGE: public.ecr.aws/ubuntu/ubuntu:24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up QEMU for arm64 Docker emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Verify arm64 Docker emulation
        run: docker run --rm --platform linux/arm64 "$DOCKER_BASE_IMAGE" true

      - name: Restore OpenClaw asset cache
        uses: actions/cache@v4
        with:
          path: |
            install_time_assets/cache
          key: andclaw-openclaw-cache-${{ runner.os }}-${{ hashFiles('scripts/setup-assets.sh') }}

      - name: Restore prepared runtime assets cache
        uses: actions/cache@v4
        with:
          path: |
            install_time_assets/src/main/assets
            app/src/main/jniLibs/arm64-v8a
          key: andclaw-runtime-assets-${{ runner.os }}-${{ hashFiles('scripts/setup-assets.sh', 'scripts/build-proot-loader32-16kb.sh') }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components (API 35)
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Create local.properties for Android SDK
        run: |
          printf "sdk.dir=%s\n" "$ANDROID_SDK_ROOT" > local.properties

      - name: Ensure debug.keystore exists
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkeypair \
              -keystore debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000
          fi

      - name: Make scripts executable
        run: chmod +x gradlew scripts/setup-assets.sh scripts/build-proot-loader32-16kb.sh

      - name: Optionally clean prepared assets
        if: github.event_name == 'workflow_dispatch' && inputs.force_asset_rebuild
        run: |
          rm -rf install_time_assets/src/main/assets
          rm -rf app/src/main/jniLibs/arm64-v8a

      - name: Prepare bundled runtime assets (proot + rootfs + Node + OpenClaw + Playwright + terminal)
        run: ./scripts/setup-assets.sh

      - name: Verify required packaged files exist
        run: |
          test -f app/src/main/jniLibs/arm64-v8a/libproot.so
          test -f app/src/main/jniLibs/arm64-v8a/libtalloc.so
          test -f app/src/main/jniLibs/arm64-v8a/libproot-loader.so
          test -f install_time_assets/src/main/assets/rootfs.tar.gz.bin
          test -f install_time_assets/src/main/assets/node-arm64.tar.gz.bin
          test -f install_time_assets/src/main/assets/system-tools-arm64.tar.gz.bin
          test -d install_time_assets/src/main/assets/openclaw
          test -f install_time_assets/src/main/assets/playwright-chromium-arm64.tar.gz.bin
          test -f install_time_assets/src/main/assets/terminal/root/andclaw-terminal/backend/src/server.js
          test -f install_time_assets/src/main/assets/terminal/root/andclaw-terminal/frontend/app.js

      - name: Build prod debug APK (full installable package)
        run: ./gradlew --no-daemon --stacktrace --info assembleProdDebug

      - name: Verify runtime payload is embedded inside APK
        run: |
          APK_PATH="app/build/outputs/apk/prod/debug/app-prod-debug.apk"
          test -f "$APK_PATH"
          unzip -l "$APK_PATH" | grep -q "assets/rootfs.tar.gz.bin"
          unzip -l "$APK_PATH" | grep -q "assets/node-arm64.tar.gz.bin"
          unzip -l "$APK_PATH" | grep -q "assets/system-tools-arm64.tar.gz.bin"
          unzip -l "$APK_PATH" | grep -q "assets/openclaw/usr/local/bin/openclaw"
          unzip -l "$APK_PATH" | grep -q "assets/playwright-chromium-arm64.tar.gz.bin"
          unzip -l "$APK_PATH" | grep -q "assets/terminal/root/andclaw-terminal/backend/src/server.js"
          unzip -l "$APK_PATH" | grep -q "assets/terminal/root/andclaw-terminal/frontend/app.js"

      - name: Upload APK artifact only
        uses: actions/upload-artifact@v4
        with:
          name: andclaw-prod-debug-apk
          path: app/build/outputs/apk/prod/debug/app-prod-debug.apk
          if-no-files-found: error
          retention-days: 14
