name: Build Windows Transfer Decrypter EXE

on:
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tools/windows-transfer-decrypter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed --name AndClawTransferDecrypter transfer_decrypter.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AndClawTransferDecrypter-windows
          path: tools/windows-transfer-decrypter/dist/AndClawTransferDecrypter.exe
          if-no-files-found: error
